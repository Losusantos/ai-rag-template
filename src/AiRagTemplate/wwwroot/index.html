<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>社内ナレッジ チャット</title>
  <style>
    :root {
      --bg: #f5f5f4;
      --panel: #ffffff;
      --border: #e0ddd8;
      --text: #2b2b2b;
      --muted: #76706a;
      --accent: #b4532a;
      --user: #eef2f7;
      --assistant: #faf7f2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    main {
      width: 100%;
      max-width: 760px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    header h1 { font-size: 18px; margin: 0; }
    header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg { padding: 12px 14px; border-radius: 10px; white-space: pre-wrap; line-height: 1.6; }
    .msg.user { background: var(--user); align-self: flex-end; max-width: 85%; }
    .msg.assistant { background: var(--assistant); border: 1px solid var(--border); align-self: flex-start; max-width: 95%; }
    .msg.error { background: #fbecec; border: 1px solid #e7c3c3; color: #8a2b2b; align-self: stretch; }

    .sources { margin-top: 8px; font-size: 12px; color: var(--muted); }
    .sources span {
      display: inline-block; background: #efece7; border: 1px solid var(--border);
      border-radius: 999px; padding: 2px 8px; margin: 2px 4px 0 0;
    }

    form { display: flex; gap: 8px; }
    textarea {
      flex: 1; resize: none; min-height: 48px; max-height: 160px;
      padding: 12px; border: 1px solid var(--border); border-radius: 10px;
      font: inherit; background: var(--panel); color: var(--text);
    }
    button {
      padding: 0 18px; border: none; border-radius: 10px;
      background: var(--accent); color: #fff; font: inherit; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: progress; }
    .hint { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>社内ナレッジ チャット</h1>
      <p>就業規則・経費精算マニュアル・FAQ をもとに回答します (RAG サンプル)。</p>
    </header>

    <div id="messages" aria-live="polite"></div>

    <form id="chat-form">
      <textarea id="input" placeholder="例: 経費精算の締め日はいつですか？" autocomplete="off"></textarea>
      <button id="send" type="submit">送信</button>
    </form>
    <p class="hint">Enter で送信 / Shift+Enter で改行</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
